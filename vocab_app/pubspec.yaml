name: vocab_app
description: "Oxford 3000 -> Thai vocabulary learning app (Phase 1 vertical slice)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.0
  path_provider: ^2.1.5
  flutter_tts: ^4.2.2
  http: ^1.2.2
  crypto: ^3.0.6
  google_fonts: ^8.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/seed/vocab.db
